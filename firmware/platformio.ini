; CleanRoom status screen — LilyGo T-Display-S3 (ESP32-S3, 320x170 ST7789)
;
; Flash:
;   1. cp src/config.h.example src/config.h   (then edit WiFi + server URL)
;   2. pio run -t upload         (or use the PlatformIO "Upload" button in VS Code)
;   3. pio device monitor        (to watch serial logs)

[env:lilygo-t-display-s3]
platform = espressif32
board = lilygo-t-display-s3
framework = arduino
monitor_speed = 115200

lib_deps =
    bodmer/TFT_eSPI@^2.5.43
    bblanchon/ArduinoJson@^7.0.0

; T-Display-S3 panel wiring for TFT_eSPI (8-bit parallel ST7789).
; These flags configure TFT_eSPI directly so no User_Setup.h edit is needed.
build_flags =
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DUSER_SETUP_LOADED
    -DST7789_DRIVER
    -DINIT_SEQUENCE_3
    -DCGRAM_OFFSET
    -DTFT_RGB_ORDER=TFT_BGR
    -DTFT_INVERSION_ON
    -DTFT_PARALLEL_8_BIT
    -DTFT_WIDTH=170
    -DTFT_HEIGHT=320
    -DTFT_DC=7
    -DTFT_RST=5
    -DTFT_WR=8
    -DTFT_RD=9
    -DTFT_D0=39
    -DTFT_D1=40
    -DTFT_D2=41
    -DTFT_D3=42
    -DTFT_D4=45
    -DTFT_D5=46
    -DTFT_D6=47
    -DTFT_D7=48
    -DTFT_BL=38
    -DTFT_BACKLIGHT_ON=HIGH
    -DLOAD_GLCD
    -DLOAD_GFXFF
    -DLOAD_FONT2
    -DLOAD_FONT4
    -DSMOOTH_FONT
    -DSPI_FREQUENCY=27000000
