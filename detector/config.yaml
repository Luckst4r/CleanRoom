# CleanRoom detector configuration

debounce_readings: 2        # a room only flips state after this many identical readings in a row

# When to check. All times are local to `timezone` (America/Chicago = Central time,
# which tracks daylight/standard automatically). Rooms are checked round-robin by
# their own cadence (see each room's `schedule`), and NOTHING is checked during
# quiet_hours.
schedule:
  timezone: "America/Chicago"
  quiet_hours: ["00:00-06:00"]   # midnight–6am: nothing is checked, ever

vision:
  # Local, OpenAI-compatible vision endpoint. The default below is Ollama running
  # on the Mac mini, so camera frames never leave the machine.
  #   1. Install Ollama (https://ollama.com), then: ollama pull qwen2.5vl:7b
  #   2. Ollama serves the API at http://localhost:11434/v1 automatically.
  base_url: "http://localhost:11434/v1"
  model: "qwen2.5vl:7b"   # a vision model that fits in 16GB; alternatives: minicpm-v, llama3.2-vision
  force_json: true        # ask the server to return strict JSON (Ollama supports this)
  max_image_width: 1024   # frames are downscaled to this width before analysis
  jpeg_quality: 80
  timeout_seconds: 120    # local models can be slower than cloud; give them room
  # api_key: only needed for cloud backends. Leave unset for local Ollama. If a
  # backend needs one, set it in detector/.env as VISION_API_KEY rather than here.

server:
  host: "0.0.0.0"   # the LilyGo screen polls this; 0.0.0.0 = reachable on your LAN
  port: 8080

rooms:
  - name: "Child's Bedroom"
    # The camera's RTSP URL is kept OUT of git: set it in detector/.env as
    #   CLEANROOM_RTSP_URL=rtsp://USER:PASS@CAM_IP:554/stream1
    # (create the Tapo "Camera Account" under Advanced Settings -> Camera Account,
    # give the camera a static DHCP lease; stream1 = full 2K, stream2 = lower res).
    # For local testing without a camera you can instead hard-code a file path here,
    # e.g.  source: "samples/childs_bedroom.jpg"
    source: "${CLEANROOM_RTSP_URL}"

    # OPTIONAL but recommended: a photo of THIS room when it is tidy. The model
    # compares against it to judge relative items (chair pushed in, lounge chair
    # facing the right way, pillows arranged). Capture it during setup like this,
    # with the room tidy, then point this at the saved file:
    #   python check.py && cp last_frame.jpg reference_childs_bedroom.jpg
    reference_image: "reference_childs_bedroom.jpg"   # baseline photo (gitignored); capture during setup

    # How often to check this room (local time). Peak = every 2 min during the kid's
    # active hours; otherwise every 15 min. Quiet hours (top of file) override all.
    schedule:
      default_interval_seconds: 900    # 15 min outside the peak windows
      peak_interval_seconds: 120       # 2 min during peak windows
      weekday_windows: ["07:00-10:00", "15:00-20:00"]
      weekend_windows: ["07:00-20:00"]

    # The tidiness checklist for THIS room. The model judges each item separately
    # and the room is untidy if ANY item fails. Each item has:
    #   label - a SHORT phrase shown on the screen as a bullet (keep under ~24 chars)
    #   rule  - the detailed condition the model checks (this is what tuning edits)
    # Add/remove/reword freely while tuning with check.py.
    checklist:
      - label: "Items on floor"
        rule: "Nothing is left lying on the floor that does not belong there: no clothes, books, toys, bags, papers, or other items on the floor. Rugs and furniture are fine. Compared to the reference photo, fail if there are new items dropped on the floor."
      - label: "Bed not made"
        rule: "Compared to the reference photo, the bed has not been clearly torn apart or slept in — the cover/blanket is still roughly in place. Stuffed animals, toys, pillows, lumps, and a loosely-pulled cover are all normal and PASS. Fail ONLY if the bedding is obviously stripped, balled up, or dragged off the bed in a way the reference photo is not."
      - label: "Pillows on floor"
        rule: "There are no pillows on the floor; pillows are on the bed or the lounge chair."
      - label: "Books left out"
        rule: "Compared to the reference photo, no NEW books have been left out on a table or desk. Anything already on the desk or shelves in the reference is fine. Be conservative: only fail if you clearly see an actual book (open, or in a stack) on a surface that is NOT in the reference. Do NOT count tablets, laptops, boxes, picture frames, remotes, or decorative items as books."
      - label: "Desk clutter"
        rule: "Compared to the reference photo, the desk and table surfaces are clear of loose items that are not in the reference — no pencils, pens, crayons, markers, loose papers, or art supplies left out. Anything already present on the desk in the reference is fine. Fail only if there are new loose items on a desk or table versus the reference."
      - label: "Lounge chair messy"
        rule: "The lounge chair faces the correct direction and its pillows are arranged tidily, matching the reference photo."

  - name: "Living Room"
    # RTSP URL kept out of git — set in detector/.env as:
    #   CLEANROOM_RTSP_URL_LIVINGROOM=rtsp://USER:PASS@CAM_IP:554/stream1
    source: "${CLEANROOM_RTSP_URL_LIVINGROOM}"

    # This room is almost entirely reference-relative: most rules mean "the same as
    # the reference photo." Capture the reference with the room exactly how it should
    # look. NOTE: one brown chair is partially obscured from the camera — the rules
    # tell the model to judge only what is visible. (The kitchen / bar stools will get
    # their own camera + room entry later.)
    reference_image: "reference_living_room.jpg"

    # Checked every 2 minutes (outside quiet hours), round-robin with the bedroom.
    schedule:
      default_interval_seconds: 120

    checklist:
      - label: "Items on carpet"
        rule: "Compared to the reference photo, nothing new is left lying on the carpet or floor — no toys, clothes, cups, bags, papers, or other items. Fail only if items appear on the floor that are not present in the reference."
      - label: "Brown chairs moved"
        rule: "The two brown chairs are in the same positions and orientations as the reference photo. One brown chair may be partially obscured from the camera; judge only what is visible. Fail only if a visible brown chair is clearly moved or turned out of place versus the reference."
      - label: "Ottoman moved"
        rule: "The white ottoman is in the same position as the reference photo. Fail only if it is clearly moved out of place versus the reference."
      - label: "Coffee table clutter"
        rule: "The coffee table holds only the centerpiece shown in the reference photo. Fail if there are extra items on the coffee table (cups, dishes, remotes, toys, books, etc.) that are not present in the reference."
      - label: "Couch pillows messy"
        rule: "The couch pillows are present and tidily arranged, roughly in the same orientation and positions as the reference photo. Their exact left-to-right color order does NOT matter. Fail only if pillows are clearly knocked over, squashed flat, piled up, dumped on the seat or floor, or otherwise obviously messy compared to the reference."
      - label: "Throw blanket"
        rule: "The throw blanket is draped over the couch the same way as in the reference photo. Fail if it is bunched up, removed, fallen off, or clearly rearranged versus the reference."
      - label: "Chair pillows gone"
        rule: "There is one white pillow on each brown chair, as in the reference photo. A brown chair may be partially visible; judge only what is visible. Fail only if a white pillow that is present in the reference is clearly missing from a brown chair."
